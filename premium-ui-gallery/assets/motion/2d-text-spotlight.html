<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2D Pattern · Text spotlight reveal</title>
  <meta name="color-scheme" content="dark" />
  <style>
    :root {
      --bg: #0A0A0A;
      --text: #FAFAFA;
      --muted: #3A3A3A;        /* The "unlit" color of the text */
      --lit: #FAFAFA;          /* The "lit" color */
      --accent: #D4FF4F;       /* The beam color */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, "Inter", sans-serif; -webkit-font-smoothing: antialiased; }
    .stage { min-height: 100vh; display: grid; place-items: center; padding: 40px 24px; }
    .headline {
      font-size: clamp(40px, 8vw, 96px);
      letter-spacing: -0.04em;
      line-height: 1.0;
      font-weight: 600;
      text-align: center;
      color: var(--muted);
      position: relative;
      max-width: 14ch;
    }
    /* The lit layer sits on top of the dim text. */
    /* A horizontal linear-gradient mask sweeps across it on a 5s loop. */
    .headline .lit {
      position: absolute;
      inset: 0;
      color: var(--lit);
      background: linear-gradient(90deg, transparent 0%, var(--lit) 30%, var(--lit) 70%, transparent 100%);
      background-size: 300% 100%;
      background-position: 100% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: sweep 5s var(--ease-out) infinite;
      pointer-events: none;
    }
    @keyframes sweep {
      0%   { background-position: 100% 0; }
      55%  { background-position: 0% 0; }
      100% { background-position: -100% 0; }
    }
    /* A subtle warm glow follows the leading edge of the beam. */
    .headline .glow {
      position: absolute;
      inset: 0;
      color: transparent;
      filter: blur(18px);
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
      background-size: 200% 100%;
      background-position: 100% 0;
      mix-blend-mode: screen;
      animation: sweep 5s var(--ease-out) infinite;
      opacity: 0.55;
      pointer-events: none;
    }
    .note { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: var(--muted); font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; }
    .back { position: fixed; top: 16px; left: 16px; color: var(--muted); font-size: 13px; text-decoration: none; border: 1px solid var(--border, rgba(255,255,255,0.1)); padding: 6px 12px; border-radius: 999px; }
    .back:hover { color: var(--accent); border-color: var(--accent); }

    @media (prefers-reduced-motion: reduce) {
      .headline .lit, .headline .glow { animation: none; background-position: 0% 0; }
      .headline .lit { color: var(--lit); -webkit-text-fill-color: var(--lit); }
    }
  </style>
</head>
<body>
  <a class="back" href="./">← All patterns</a>
  <div class="stage">
    <h1 class="headline">
      The headline reveals like stage lighting.
      <span class="lit" aria-hidden="true">The headline reveals like stage lighting.</span>
      <span class="glow" aria-hidden="true">The headline reveals like stage lighting.</span>
    </h1>
  </div>
  <div class="note">Text spotlight · 5s loop</div>
</body>
</html>
